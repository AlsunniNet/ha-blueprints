blueprint:
  name: AlsunniNet | Lights and Fans Control
  description: >
    # 🏛️ AlsunniNet Pro Suite
    Advanced control for occupancy, climate, and lighting.
  domain: automation
  source_url: https://raw.githubusercontent.com/AlsunniNet/ha-blueprints/main/motion_light_fan/motion_light_fan.yaml
  input:
    # --- SENSORS ---
    occupancy_entities:
      name: Motion or Occupancy Sensors (Required)
      selector:
        entity:
          domain: binary_sensor
          device_class: [motion, occupancy]
          multiple: true
    door_sensors:
      name: Door/Window Sensors (Optional)
      default: []
      selector:
        entity:
          domain: binary_sensor
          device_class: [door, window, opening]
          multiple: true

    # --- LIGHTING & LUX ---
    light_target:
      name: Lights (Required)
      selector:
        target:
          entity:
            domain: light
    no_motion_wait:
      name: Light Off Delay
      default: 5
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: minutes
    light_sensor:
      name: Lux Sensor (Numeric)
      default: []
      selector:
        entity:
          domain: sensor
          device_class: illuminance
    lux_threshold:
      name: Lux Threshold
      default: 20
      selector:
        number:
          min: 0
          max: 500
          unit_of_measurement: lx
    binary_light_sensor:
      name: Light/Dark Sensor (Binary)
      default: []
      selector:
        entity:
          domain: binary_sensor
          multiple: false

    # --- FAN & CLIMATE ---
    fan_target:
      name: Fans (Optional)
      default: {}
      selector:
        target:
          entity:
            domain: fan
    fan_delay_off:
      name: Fan Extra Run Time
      default: 30
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: minutes
    fan_max_runtime:
      name: Fan Maximum Run Time
      default: 4
      selector:
        number:
          min: 1
          max: 12
          unit_of_measurement: h
    humidity_sensor:
      name: Humidity Sensor (Optional)
      default: []
      selector:
        entity:
          domain: sensor
          device_class: humidity
    humidity_threshold:
      name: Humidity Threshold
      default: 65
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

mode: restart

variables:
  fan_target: !input fan_target
  light_off_min: !input no_motion_wait
  fan_extra_min: !input fan_delay_off
  max_run_hours: !input fan_max_runtime
  hum_sensor: !input humidity_sensor
  hum_limit: !input humidity_threshold
  lux_sensor: !input light_sensor
  lux_limit: !input lux_threshold
  bin_light: !input binary_light_sensor
  door_sensors: !input door_sensors
  safe_max_run: >
    {% set normal_run_hrs = (light_off_min + fan_extra_min) / 60 %}
    {% if max_run_hours <= normal_run_hrs %}
      {{ (normal_run_hrs + 0.5) | round(2) }}
    {% else %}
      {{ max_run_hours }}
    {% endif %}

trigger:
  - platform: state
    entity_id: !input occupancy_entities
    from: "off"
    to: "on"
    id: motion_on
  - platform: state
    entity_id: !input occupancy_entities
    from: "on"
    to: "off"
    for:
      minutes: !input no_motion_wait
    id: motion_off
  - platform: state
    entity_id: !input door_sensors
    from: "closed"
    to: "open"
    id: door_opened
  - platform: template
    value_template: >
      {{ hum_sensor != [] and states(hum_sensor) | float(0) > hum_limit | float }}
    id: humidity_high

action:
  - choose:
      # --- ON LOGIC ---
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: motion_on
              - condition: trigger
                id: humidity_high
        sequence:
          - if:
              - condition: trigger
                id: motion_on
              - condition: template
                value_template: >
                  {% set lux_ok = lux_sensor == [] or states(lux_sensor) | float(0) < lux_limit | float %}
                  {% set bin_ok = bin_light == [] or is_state(bin_light, 'off') or is_state(bin_light, 'dark') %}
                  {{ lux_ok and bin_ok }}
            then:
              - action: light.turn_on
                target: !input light_target
          - if:
              - condition: template
                value_template: "{{ fan_target != {} }}"
            then:
              - action: fan.turn_on
                target: !input fan_target

      # --- OFF LOGIC ---
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: motion_off
              - condition: trigger
                id: door_opened
        sequence:
          # If triggered by a door opening, we check if motion is actually clear first
          - if:
              - condition: trigger
                id: door_opened
            then:
              - wait_for_trigger:
                  - platform: state
                    entity_id: !input occupancy_entities
                    to: "off"
                    for:
                      minutes: !input no_motion_wait
                continue_on_timeout: false
          
          # TURN OFF LIGHTS
          - action: light.turn_off
            target: !input light_target
          
          # FAN LOGIC
          - if:
              - condition: template
                value_template: "{{ fan_target != {} }}"
            then:
              - parallel:
                  # Branch 1: Safety Hard-Stop
                  - sequence:
                      - delay:
                          hours: "{{ safe_max_run | float }}"
                      - action: fan.turn_off
                        target: !input fan_target
                  # Branch 2: Normal logic (Humidity or Timer)
                  - sequence:
                      - if:
                          - condition: template
                            value_template: "{{ hum_sensor != [] }}"
                        then:
                          - wait_for_trigger:
                              - platform: template
                                value_template: "{{ states(hum_sensor) | float(0) < hum_limit | float }}"
                            timeout: "02:00:00"
                        else:
                          - delay:
                              minutes: "{{ fan_extra_min }}"
                      - action: fan.turn_off
                        target: !input fan_target
