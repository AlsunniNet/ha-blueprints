blueprint:
  name: AlsunniNet | Motion Light and Delayed Fan Off
  description: >
    Turns on lights and fans when motion is detected.
    The light turns off after a set delay, and the fan runs for an additional period.
  domain: automation
  source_url: https://raw.githubusercontent.com/AlsunniNet/ha-blueprints/main/motion_light_fan/motion_light_fan.yaml
  input:
    motion_entity:
      name: Motion Sensors
      description: Select the motion sensor(s) to trigger the automation.
      selector:
        entity:
          domain: binary_sensor
          device_class: motion
          multiple: true
    light_target:
      name: Lights
      description: Select Entities, Devices, or Areas for lights.
      selector:
        target:
          entity:
            domain: light
    fan_target:
      name: Fans
      description: Select Entities, Devices, or Areas for fans.
      selector:
        target:
          entity:
            domain: fan
    no_motion_wait:
      name: Light Off Delay
      default: 10
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: minutes
    fan_delay_off:
      name: Fan Extra Run Time
      default: 30
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: minutes
    start_time:
      name: Active After
      default: "08:00:00"
      selector:
        time:
    end_time:
      name: Active Before
      default: "21:00:00"
      selector:
        time:
    workdays:
      name: Active Days
      default: [mon, tue, wed, thu, sun]
      selector:
        select:
          options:
            - {label: "Monday", value: mon}
            - {label: "Tuesday", value: tue}
            - {label: "Wednesday", value: wed}
            - {label: "Thursday", value: thu}
            - {label: "Friday", value: fri}
            - {label: "Saturday", value: sat}
            - {label: "Sunday", value: sun}
          multiple: true

mode: restart

trigger:
  - platform: state
    entity_id: !input motion_entity
    from: "off"
    to: "on"
    id: motion
  - platform: state
    entity_id: !input motion_entity
    from: "on"
    to: "off"
    for:
      minutes: !input no_motion_wait
    id: no_motion

condition:
  - condition: time
    after: !input start_time
    before: !input end_time
    weekday: !input workdays

action:
  - choose:
      - conditions:
          - condition: trigger
            id: motion
        sequence:
          - action: light.turn_on
            target: !input light_target
          - action: fan.turn_on
            target: !input fan_target
      - conditions:
          - condition: trigger
            id: no_motion
        sequence:
          - action: light.turn_off
            target: !input light_target
          - delay:
              minutes: !input fan_delay_off
          - action: fan.turn_off
            target: !input fan_target
