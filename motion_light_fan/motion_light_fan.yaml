blueprint:
  name: AlsunniNet | Lights and Fans Control
  description: >
    Advanced occupancy, climate, and lighting control.
    Now includes **Door/Window Logic**: If the door is closed, the automation 
    "locks" the current state until the door is opened and motion stops.
  domain: automation
  source_url: https://raw.githubusercontent.com/AlsunniNet/ha-blueprints/main/motion_light_fan/motion_light_fan.yaml
  input:
    # --- SENSORS ---
    motion_entities:
      name: Motion Sensors (Required)
      selector:
        entity:
          domain: binary_sensor
          device_class: motion
          multiple: true
    door_sensors:
      name: Door/Window Sensors (Optional)
      description: If closed, lights/fans will not turn off until reopened and motion stops.
      default: []
      selector:
        entity:
          domain: binary_sensor
          device_class: [door, window, opening]
          multiple: true

    # --- LIGHTING ---
    light_target:
      name: Lights (Required)
      selector:
        target:
          entity:
            domain: light
    no_motion_wait:
      name: Light Off Delay
      default: 5
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: minutes
    light_sensor:
      name: Light Sensor (Optional Lux)
      default: []
      selector:
        entity:
          domain: sensor
          device_class: illuminance
    lux_threshold:
      name: Lux Threshold
      default: 20
      selector:
        number:
          min: 0
          max: 500
          unit_of_measurement: lx

    # --- FAN & CLIMATE ---
    fan_target:
      name: Fans (Optional)
      default: {}
      selector:
        target:
          entity:
            domain: fan
    fan_delay_off:
      name: Fan Extra Run Time
      default: 30
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: minutes
    humidity_sensor:
      name: Humidity Sensor (Optional)
      default: []
      selector:
        entity:
          domain: sensor
          device_class: humidity
    humidity_threshold:
      name: Humidity Threshold
      default: 65
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"
    temp_sensor:
      name: Temperature Sensor (Optional)
      default: []
      selector:
        entity:
          domain: sensor
          device_class: temperature
    temp_threshold:
      name: Temperature Threshold
      default: 28
      selector:
        number:
          min: 0
          max: 50
          unit_of_measurement: "°C"

mode: restart

variables:
  motion_sensors: !input motion_entities
  door_sensors: !input door_sensors
  fan_target: !input fan_target
  fan_extra: !input fan_delay_off
  lux_sensor: !input light_sensor
  lux_limit: !input lux_threshold
  hum_sensor: !input humidity_sensor
  hum_limit: !input humidity_threshold
  tmp_sensor: !input temp_sensor
  tmp_limit: !input temp_threshold

trigger:
  - platform: state
    entity_id: !input motion_entities
    from: "off"
    to: "on"
    id: motion_on
  - platform: state
    entity_id: !input motion_entities
    from: "on"
    to: "off"
    for:
      minutes: !input no_motion_wait
    id: motion_off
  - platform: state
    entity_id: !input door_sensors
    from: "closed"
    to: "open"
    id: door_opened
  - platform: template
    value_template: >
      {{ hum_sensor != [] and states(hum_sensor) | float(0) > hum_limit | float }}
    id: humidity_high
  - platform: template
    value_template: >
      {{ tmp_sensor != [] and states(tmp_sensor) | float(0) > tmp_limit | float }}
    id: temp_high

action:
  - choose:
      # --- ON LOGIC: Motion or Climate ---
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: motion_on
              - condition: trigger
                id: humidity_high
              - condition: trigger
                id: temp_high
        sequence:
          - if:
              - condition: trigger
                id: motion_on
              - condition: template
                value_template: >
                  {{ lux_sensor == [] or states(lux_sensor) | float(0) < lux_limit | float }}
            then:
              - action: light.turn_on
                target: !input light_target
          - if:
              - condition: template
                value_template: "{{ fan_target != {} }}"
            then:
              - action: fan.turn_on
                target: !input fan_target

      # --- OFF LOGIC: Initiated by No Motion or Door Opening ---
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: motion_off
              - condition: trigger
                id: door_opened
        sequence:
          # WAIT condition: Don't proceed if door is closed OR motion is active
          - wait_for_trigger:
              - platform: state
                entity_id: !input motion_entities
                to: "off"
                for:
                  minutes: !input no_motion_wait
            continue_on_timeout: false
          
          # Additional check: If a door is selected, it MUST be open to turn off lights
          - condition: template
            value_template: >
              {{ door_sensors == [] or is_state(door_sensors[0], 'on') }}

          - action: light.turn_off
            target: !input light_target
          
          # Fan Shutdown Logic
          - if:
              - condition: template
                value_template: "{{ fan_target != {} }}"
            then:
              - if:
                  - condition: template
                    value_template: "{{ hum_sensor != [] }}"
                then:
                  - wait_for_trigger:
                      - platform: template
                        value_template: "{{ states(hum_sensor) | float(0) < hum_limit | float }}"
                    timeout: "01:00:00"
                else:
                  - delay:
                      minutes: "{{ fan_extra }}"
              - action: fan.turn_off
                target: !input fan_target
