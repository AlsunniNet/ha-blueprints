blueprint:
  name: AlsunniNet | Lights and Fans Control
  description: >
    # 🏛️ AlsunniNet Pro Suite
    Advanced control for occupancy, climate, and lighting.
    The Fan Maximum Run Time acts as a safety cutoff.
  domain: automation
  source_url: https://raw.githubusercontent.com/AlsunniNet/ha-blueprints/main/motion_light_fan/motion_light_fan.yaml
  input:
    # --- SENSORS ---
    occupancy_entities:
      name: Motion or Occupancy Sensors
      selector:
        entity:
          domain: binary_sensor
          device_class: [motion, occupancy]
          multiple: true
    
    # --- LIGHTING ---
    light_target:
      name: Lights
      selector:
        target:
          entity:
            domain: light
    no_motion_wait:
      name: Light Off Delay
      default: 5
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: minutes

    # --- FAN & CLIMATE ---
    fan_target:
      name: Fans
      default: {}
      selector:
        target:
          entity:
            domain: fan
    fan_delay_off:
      name: Fan Extra Run Time
      description: Extra minutes after light turns off.
      default: 30
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: minutes
    fan_max_runtime:
      name: Fan Maximum Run Time
      description: Force-stop fan after this many hours (Adjustable 1-12h).
      default: 4
      selector:
        number:
          min: 1
          max: 12
          step: 1
          unit_of_measurement: h

mode: restart

variables:
  fan_target: !input fan_target
  light_off_min: !input no_motion_wait
  fan_extra_min: !input fan_delay_off
  max_run_hours: !input fan_max_runtime
  # Calculates the "Safe" limit to ensure Max Runtime > Normal Logic
  safe_max_run: >
    {% set normal_run_hrs = (light_off_min + fan_extra_min) / 60 %}
    {% if max_run_hours <= normal_run_hrs %}
      {{ (normal_run_hrs + 0.5) | round(2) }}
    {% else %}
      {{ max_run_hours }}
    {% endif %}

trigger:
  - platform: state
    entity_id: !input occupancy_entities
    from: "off"
    to: "on"
    id: motion_on
  - platform: state
    entity_id: !input occupancy_entities
    from: "on"
    to: "off"
    for:
      minutes: !input no_motion_wait
    id: motion_off

action:
  - choose:
      # --- ON LOGIC ---
      - conditions:
          - condition: trigger
            id: motion_on
        sequence:
          - action: light.turn_on
            target: !input light_target
          - if:
              - condition: template
                value_template: "{{ fan_target != {} }}"
            then:
              - action: fan.turn_on
                target: !input fan_target
              # This parallel block handles the adjustable safety cutoff
              - parallel:
                  - sequence:
                      - delay:
                          hours: "{{ safe_max_run | float }}"
                      - action: fan.turn_off
                        target: !input fan_target

      # --- OFF LOGIC ---
      - conditions:
          - condition: trigger
            id: motion_off
        sequence:
          - action: light.turn_off
            target: !input light_target
          - if:
              - condition: template
                value_template: "{{ fan_target != {} }}"
            then:
              - delay:
                  minutes: "{{ fan_extra_min }}"
              - action: fan.turn_off
                target: !input fan_target
