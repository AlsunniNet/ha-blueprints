blueprint:
  name: AlsunniNet | Motion Light and Delayed Fan Off
  description: >
    # 💡 AlsunniNet Motion Suite
    Turns on a light and fan in a specific area when motion is detected.
    The light turns off after a set delay of no motion, and the fan continues 
    running for an additional period to ensure proper ventilation.
    
    Brought to you by AlsunniNet.
  domain: automation
  source_url: https://github.com/AlsunniNet/ha-blueprints/blob/main/motion_light_fan/motion_light_fan.yaml
  author: AlsunniNet
  input:
    motion_entity:
      name: Motion Sensor
      description: The sensor that triggers the automation.
      selector:
        entity:
          domain: binary_sensor
          device_class: motion
    target_area:
      name: Target Area
      description: The area containing the lights and fans to control.
      selector:
        area:
    no_motion_wait:
      name: Light Off Delay
      description: Minutes to wait after last motion before turning the LIGHT off.
      default: 10
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: minutes
    fan_delay_off:
      name: Fan Extra Run Time
      description: Minutes to keep the fan running AFTER the light has turned off.
      default: 30
      selector:
        number:
          min: 0
          max: 120
          unit_of_measurement: minutes
    start_time:
      name: Active After
      description: The time of day the automation starts being active.
      default: "08:00:00"
      selector:
        time:
    end_time:
      name: Active Before
      description: The time of day the automation stops being active.
      default: "21:00:00"
      selector:
        time:
    workdays:
      name: Active Days
      description: Select which days the automation should run.
      default: [mon, tue, wed, thu, sun]
      selector:
        select:
          options:
            - {label: "Monday", value: mon}
            - {label: "Tuesday", value: tue}
            - {label: "Wednesday", value: wed}
            - {label: "Thursday", value: thu}
            - {label: "Friday", value: fri}
            - {label: "Saturday", value: sat}
            - {label: "Sunday", value: sun}
          multiple: true

mode: restart

trigger:
  - platform: state
    entity_id: !input motion_entity
    from: "off"
    to: "on"
    id: motion
  - platform: state
    entity_id: !input motion_entity
    from: "on"
    to: "off"
    for:
      minutes: !input no_motion_wait
    id: no_motion

condition:
  - condition: time
    after: !input start_time
    before: !input end_time
    weekday: !input workdays

action:
  - choose:
      # MOTION DETECTED: Turn everything on
      - conditions:
          - condition: trigger
            id: motion
        sequence:
          - action: light.turn_on
            target:
              area_id: !input target_area
          - action: fan.turn_on
            target:
              area_id: !input target_area

      # NO MOTION: Turn off light, wait, then turn off fan
      - conditions:
          - condition: trigger
            id: no_motion
        sequence:
          - action: light.turn_off
            target:
              area_id: !input target_area
          - delay:
              minutes: !input fan_delay_off
          - action: fan.turn_off
            target:
              area_id: !input target_area
