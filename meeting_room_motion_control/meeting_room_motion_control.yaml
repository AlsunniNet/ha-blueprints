blueprint:
  name: AlsunniNet | Room Light's Motion Control
  description: |
    Turn on lights (and optionally AC) when motion is detected, but keep them on for a long timeout
    to accommodate static activities. Optionally use a door/window sensor, keep mood lights on
    when the room is empty, and respect media player state.
  domain: automation
  input:
    motion_sensor:
      name: Motion Sensor
      selector:
        entity:
          domain: binary_sensor
          device_class: motion
    light_target:
      name: Main Lights
      description: Lights that turn on fully during occupancy and turn off after no motion.
      selector:
        target:
          entity:
            domain: light
    delay_off:
      name: Keep‑on Time after Last Motion
      default: "01:00:00"
      selector:
        duration:
    manual_override:
      name: Manual Override Switch (optional)
      default: []
      selector:
        entity:
          domain: input_boolean
    brightness_sensor:
      name: Brightness Sensor (optional)
      default: []
      selector:
        entity:
          domain: sensor
          device_class: illuminance
    brightness_threshold:
      name: Brightness Threshold (lux)
      default: 50
      selector:
        number:
          min: 0
          max: 1000
          unit_of_measurement: lux
    climate_entity:
      name: Climate Device (optional)
      default: []
      selector:
        entity:
          domain: climate
    temperature_sensor:
      name: Temperature Sensor (optional)
      default: []
      selector:
        entity:
          domain: sensor
          device_class: temperature
    ac_threshold:
      name: AC Activation Temperature (°C)
      default: 24
      selector:
        number:
          min: 10
          max: 40
          step: 0.5
          unit_of_measurement: °C
    ac_target_temp:
      name: AC Target Temperature (°C)
      default: 22
      selector:
        number:
          min: 16
          max: 30
          step: 0.5
          unit_of_measurement: °C
    media_player:
      name: Media Player (optional)
      default: []
      selector:
        entity:
          domain: media_player
    media_player_off_state:
      name: Media Player “Off” State
      default: "off"
      selector:
        text:
    media_player_auto_off:
      name: Only Turn Off when Media Player is Off (optional)
      default: false
      selector:
        boolean:
    media_player_off_delay:
      name: Media Player Off Delay
      default: "00:00:00"
      selector:
        duration:
    contact_sensor:
      name: Door/Window Sensor (optional)
      default: []
      selector:
        entity:
          domain: binary_sensor
          device_class:
            - door
            - window
            - opening
    contact_triggers_motion:
      name: Treat contact sensor open as motion
      default: false
      selector:
        boolean:
    contact_prevents_auto_off:
      name: Prevent auto‑off while contact sensor is closed
      default: false
      selector:
        boolean:
    mood_lights:
      name: Mood Lights (optional)
      description: Lights that stay on at a low brightness when main lights are off (prevents pitch dark).
      default: []
      selector:
        target:
          entity:
            domain: light
    mood_brightness:
      name: Mood Brightness (%)
      description: Brightness level for mood lights (1-100). Leave empty to use the light's default.
      default: 10
      selector:
        number:
          min: 1
          max: 100
          unit_of_measurement: "%"
    mood_turn_off_during_meeting:
      name: Turn off mood lights during occupancy
      description: When motion is detected, turn off mood lights (they are not needed because main lights are on).
      default: true
      selector:
        boolean:

mode: restart
max_exceeded: silent

triggers:
  - trigger: state
    entity_id: !input motion_sensor
    to: "on"
    id: motion_on
  - trigger: state
    entity_id: !input motion_sensor
    to: "off"
    for: !input delay_off
    id: motion_off
  - trigger: state
    entity_id: !input contact_sensor
    to: "on"
    id: contact_open
    enabled: !input contact_triggers_motion

conditions: []

actions:
  - choose:
      # ----------------------------------------------------------------------
      # CASE 1: Motion detected OR contact opened
      # ----------------------------------------------------------------------
      - conditions:
          - condition: or
            conditions:
              - condition: trigger
                id: motion_on
              - condition: trigger
                id: contact_open
                enabled: !input contact_triggers_motion
          - condition: template
            alias: Brightness condition
            value_template: >
              {% set sensor = brightness_sensor %}
              {% if sensor is none or sensor == '' or sensor|string == '' %}
                true
              {% else %}
                {% set lux = states(sensor) | float(-1) %}
                {% if lux < 0 %}
                  true
                {% else %}
                  {{ lux < brightness_threshold }}
                {% endif %}
              {% endif %}
          - condition: template
            alias: Media player condition
            value_template: >
              {% set player = media_player %}
              {% if player is none or player == '' or player|string == '' %}
                true
              {% else %}
                {{ states(player) == media_player_off_state }}
              {% endif %}
        sequence:
          - action: light.turn_on
            target: !input light_target
          - if:
              - condition: template
                value_template: "{{ mood_turn_off_during_meeting }}"
              - condition: template
                value_template: >
                  {% set mood = mood_lights %}
                  {% if mood is none or mood == '' or mood|string == '' %}
                    false
                  {% else %}
                    true
                  {% endif %}
            then:
              - action: light.turn_off
                target: !input mood_lights
          - if:
              - condition: template
                value_template: >
                  {% set climate = climate_entity %}
                  {% if climate is none or climate == '' or climate|string == '' %}
                    false
                  {% else %}
                    {% set temp_sensor = temperature_sensor %}
                    {% if temp_sensor is none or temp_sensor == '' or temp_sensor|string == '' %}
                      {% set current_temp = state_attr(climate, 'current_temperature') %}
                    {% else %}
                      {% set current_temp = states(temp_sensor) | float %}
                    {% endif %}
                    {{ current_temp > ac_threshold }}
                  {% endif %}
            then:
              - action: climate.set_hvac_mode
                data:
                  hvac_mode: cool
                target:
                  entity_id: !input climate_entity
              - action: climate.set_temperature
                data:
                  temperature: !input ac_target_temp
                target:
                  entity_id: !input climate_entity
          - if:
              - condition: template
                value_template: >
                  {% set override = manual_override %}
                  {% if override is none or override == '' or override|string == '' %}
                    false
                  {% else %}
                    true
                  {% endif %}
            then:
              - action: input_boolean.turn_off
                target:
                  entity_id: !input manual_override

      # ----------------------------------------------------------------------
      # CASE 2: No motion for the configured delay (with overrides)
      # ----------------------------------------------------------------------
      - conditions:
          - condition: trigger
            id: motion_off
          - condition: template
            value_template: >
              {% set override = manual_override %}
              {% if override is none or override == '' or override|string == '' %}
                true
              {% else %}
                {{ states(override) != 'on' }}
              {% endif %}
          - condition: template
            alias: Contact sensor auto‑off prevention
            value_template: >
              {% set contact = contact_sensor %}
              {% if not contact_prevents_auto_off or contact is none or contact == '' or contact|string == '' %}
                true
              {% else %}
                {{ states(contact) != 'off' }}
              {% endif %}
          - condition: template
            alias: Media player auto‑off condition
            value_template: >
              {% set player = media_player %}
              {% if not media_player_auto_off or player is none or player == '' or player|string == '' %}
                true
              {% else %}
                {% set last_changed = as_timestamp(states[player].last_changed) %}
                {{ now().timestamp() - last_changed > media_player_off_delay.seconds }}
                and states(player) == media_player_off_state
              {% endif %}
        sequence:
          - if:
              - condition: template
                value_template: >
                  {% set main = expand(light_target) %}
                  {% set mood = expand(mood_lights) if mood_lights is not none and mood_lights != '' and mood_lights|string != '' else [] %}
                  {% set to_turn_off = main | reject('in', mood) | list %}
                  {{ to_turn_off | length > 0 }}
            then:
              - action: light.turn_off
                target:
                  entity_id: >
                    {% set main = expand(light_target) %}
                    {% set mood = expand(mood_lights) if mood_lights is not none and mood_lights != '' and mood_lights|string != '' else [] %}
                    {% set to_turn_off = main | reject('in', mood) | list %}
                    {{ to_turn_off | map(attribute='entity_id') | list }}
          - if:
              - condition: template
                value_template: >
                  {% set climate = climate_entity %}
                  {% if climate is none or climate == '' or climate|string == '' %}
                    false
                  {% else %}
                    true
                  {% endif %}
            then:
              - action: climate.set_hvac_mode
                data:
                  hvac_mode: "off"
                target:
                  entity_id: !input climate_entity
          - if:
              - condition: template
                value_template: >
                  {% set mood = mood_lights %}
                  {% if mood is none or mood == '' or mood|string == '' %}
                    false
                  {% else %}
                    true
                  {% endif %}
            then:
              - action: light.turn_on
                data:
                  brightness_pct: !input mood_brightness
                target: !input mood_lights

    default:
      # Optional: log a warning if no case matches (helps debugging)
      - action: system_log.write
        metadata: {}
        data:
          level: warning
          message: >
            AlsunniNet Room Lights blueprint: No condition matched. Trigger ID: {{ trigger.id }}
